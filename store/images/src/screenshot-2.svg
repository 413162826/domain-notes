<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef6e7"/>
      <stop offset="100%" stop-color="#ffe9d0"/>
    </linearGradient>
    <filter id="cardShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#a06a00" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg2)"/>

  <!-- Title -->
  <g transform="translate(70, 80)">
    <rect width="6" height="60" rx="3" fill="#ff9a3a"/>
    <text x="20" y="40" font-size="44" font-weight="800" fill="#1c2b4a">Markdown 快捷键</text>
    <text x="20" y="72" font-size="44" font-weight="800" fill="#1c2b4a">手不离键盘</text>
    <text x="20" y="110" font-size="18" fill="#7a5a30">焦点在编辑器时全部生效 · 标准 Markdown 编辑器键位</text>
  </g>

  <!-- Shortcut grid -->
  <g transform="translate(70, 240)">
    <!-- Row 1 -->
    <g>
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="130" height="32" rx="6" fill="#1c2b4a"/>
      <text x="81" y="40" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl + 1~6</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">标题 H1 – H6</text>
    </g>
    <g transform="translate(300, 0)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="100" height="32" rx="6" fill="#1c2b4a"/>
      <text x="66" y="40" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl + B</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">粗体</text>
    </g>
    <g transform="translate(600, 0)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="100" height="32" rx="6" fill="#1c2b4a"/>
      <text x="66" y="40" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl + I</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">斜体</text>
    </g>
    <g transform="translate(900, 0)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="100" height="32" rx="6" fill="#1c2b4a"/>
      <text x="66" y="40" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl + L</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">无序列表</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 110)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="140" height="32" rx="6" fill="#1c2b4a"/>
      <text x="86" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl+Shift+L</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">有序列表</text>
    </g>
    <g transform="translate(300, 110)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="140" height="32" rx="6" fill="#1c2b4a"/>
      <text x="86" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl+Shift+T</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">待办列表</text>
    </g>
    <g transform="translate(600, 110)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="100" height="32" rx="6" fill="#1c2b4a"/>
      <text x="66" y="40" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl + K</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">插入链接</text>
    </g>
    <g transform="translate(900, 110)">
      <rect width="280" height="86" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
      <rect x="16" y="18" width="140" height="32" rx="6" fill="#1c2b4a"/>
      <text x="86" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl+Shift+C</text>
      <text x="16" y="76" font-size="14" fill="#4a5972" font-weight="600">代码块</text>
    </g>

    <!-- Triggers section -->
    <g transform="translate(0, 250)">
      <text font-size="22" font-weight="700" fill="#1c2b4a">输入即触发 — 不用记符号</text>

      <g transform="translate(0, 30)">
        <rect width="580" height="200" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
        <g transform="translate(24, 36)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">#·空格</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <text x="148" y="24" font-size="24" font-weight="700" fill="#1c2b4a">大标题</text>
        </g>
        <g transform="translate(24, 80)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">-·空格</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <text x="148" y="24" font-size="16" fill="#4a5972">• 无序列表项</text>
        </g>
        <g transform="translate(24, 124)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">1.·空格</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <text x="148" y="24" font-size="16" fill="#4a5972">1. 编号列表项</text>
        </g>
        <g transform="translate(24, 168)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">&gt;·空格</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <rect x="148" y="2" width="4" height="22" fill="#d0d0d0"/>
          <text x="162" y="20" font-size="14" fill="#7a8aa3">引用块</text>
        </g>
      </g>

      <g transform="translate(600, 30)">
        <rect width="580" height="200" rx="14" fill="#fff" filter="url(#cardShadow2)"/>
        <g transform="translate(24, 36)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">```</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <rect x="148" y="2" width="200" height="32" rx="4" fill="#2b2b2b"/>
          <text x="158" y="22" font-size="13" font-family="SF Mono" fill="#f8f8f2">代码块</text>
        </g>
        <g transform="translate(24, 80)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">**粗**</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <text x="148" y="24" font-size="18" font-weight="800" fill="#1c2b4a">粗体</text>
        </g>
        <g transform="translate(24, 124)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">*斜*</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <text x="148" y="24" font-size="18" font-style="italic" fill="#1c2b4a">斜体</text>
        </g>
        <g transform="translate(24, 168)">
          <rect width="100" height="32" rx="6" fill="#1c2b4a"/>
          <text x="50" y="22" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">---</text>
          <text x="116" y="22" font-size="20" fill="#7a8aa3">→</text>
          <line x1="148" y1="16" x2="350" y2="16" stroke="#d0d0d0" stroke-width="2"/>
        </g>
      </g>
    </g>
  </g>
</svg>
