<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="100%" stop-color="#ffe0ed"/>
    </linearGradient>
    <filter id="popupShadow4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#8b0a48" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg4)"/>

  <!-- Left text -->
  <g transform="translate(70, 100)">
    <rect width="6" height="60" rx="3" fill="#e91e63"/>
    <text x="20" y="40" font-size="44" font-weight="800" fill="#1c2b4a">粘贴图片</text>
    <text x="20" y="92" font-size="44" font-weight="800" fill="#1c2b4a">直接内嵌</text>
    <text x="20" y="140" font-size="18" fill="#7a3a5c" font-weight="500">截图 Ctrl+V 即可</text>
    <text x="20" y="166" font-size="18" fill="#7a3a5c" font-weight="500">不用 [![]()] 那套语法</text>

    <g transform="translate(0, 220)">
      <g>
        <circle cx="14" cy="14" r="14" fill="#e91e63"/>
        <text x="14" y="20" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">📋</text>
        <text x="40" y="20" font-size="16" font-weight="700" fill="#1c2b4a">从剪贴板粘贴</text>
      </g>
      <g transform="translate(0, 50)">
        <circle cx="14" cy="14" r="14" fill="#e91e63"/>
        <text x="14" y="20" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">🖱</text>
        <text x="40" y="20" font-size="16" font-weight="700" fill="#1c2b4a">拖拽文件到笔记</text>
      </g>
      <g transform="translate(0, 100)">
        <circle cx="14" cy="14" r="14" fill="#e91e63"/>
        <text x="14" y="20" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">🔍</text>
        <text x="40" y="20" font-size="16" font-weight="700" fill="#1c2b4a">点击图片全屏预览</text>
      </g>
      <g transform="translate(0, 150)">
        <circle cx="14" cy="14" r="14" fill="#e91e63"/>
        <text x="14" y="20" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">💾</text>
        <text x="40" y="20" font-size="16" font-weight="700" fill="#1c2b4a">base64 内嵌存储</text>
      </g>
    </g>
  </g>

  <!-- Popup with images -->
  <g transform="translate(770, 80)" filter="url(#popupShadow4)">
    <rect width="450" height="640" rx="10" fill="#fff"/>

    <!-- Header -->
    <rect x="0" y="0" width="450" height="48" rx="10" fill="#fafafa"/>
    <rect x="0" y="38" width="450" height="10" fill="#fafafa"/>
    <rect x="0" y="47" width="450" height="1" fill="#ebebeb"/>
    <rect x="14" y="14" width="20" height="20" rx="3" fill="#dfe7f3"/>
    <text x="42" y="22" font-size="13" font-weight="700" fill="#1c2b4a">figma.com</text>
    <text x="42" y="38" font-size="10" fill="#7a8aa3">设计规范收集</text>

    <!-- Content -->
    <g transform="translate(24, 70)">
      <text font-size="22" font-weight="700" fill="#1c2b4a">设计灵感</text>

      <text y="36" font-size="13" fill="#4a5972">配色对比：</text>

      <!-- Image 1 - color palette -->
      <g transform="translate(0, 48)">
        <rect width="402" height="80" rx="6" fill="#fff" stroke="#e4e4e4"/>
        <rect x="8" y="8" width="64" height="64" rx="4" fill="#2680eb"/>
        <rect x="80" y="8" width="64" height="64" rx="4" fill="#ff9a3a"/>
        <rect x="152" y="8" width="64" height="64" rx="4" fill="#3fa961"/>
        <rect x="224" y="8" width="64" height="64" rx="4" fill="#e91e63"/>
        <rect x="296" y="8" width="64" height="64" rx="4" fill="#9c27b0"/>
        <text x="376" y="46" font-size="11" fill="#7a8aa3" text-anchor="middle">+3</text>
      </g>

      <text y="158" font-size="13" fill="#4a5972">竞品截图：</text>

      <!-- Image 2 - mockup of a UI -->
      <g transform="translate(0, 170)">
        <rect width="402" height="180" rx="6" fill="#1c2b4a"/>
        <rect x="14" y="14" width="60" height="6" rx="3" fill="#3a8eff"/>
        <rect x="14" y="28" width="100" height="4" rx="2" fill="#5e7a99"/>
        <rect x="14" y="50" width="120" height="80" rx="6" fill="#22324f"/>
        <rect x="142" y="50" width="120" height="80" rx="6" fill="#22324f"/>
        <rect x="270" y="50" width="120" height="80" rx="6" fill="#22324f"/>
        <rect x="14" y="142" width="80" height="20" rx="10" fill="#3a8eff"/>
        <text x="54" y="156" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Action</text>
      </g>

      <text y="376" font-size="13" fill="#4a5972">流程图：</text>

      <!-- Image 3 - flowchart  -->
      <g transform="translate(0, 388)">
        <rect width="402" height="120" rx="6" fill="#fff5d6"/>
        <circle cx="60" cy="60" r="22" fill="#ffce3a"/>
        <text x="60" y="64" font-size="12" font-weight="700" fill="#7a4400" text-anchor="middle">A</text>
        <line x1="84" y1="60" x2="172" y2="60" stroke="#7a4400" stroke-width="2"/>
        <path d="M168 56 L172 60 L168 64" fill="none" stroke="#7a4400" stroke-width="2"/>
        <circle cx="200" cy="60" r="22" fill="#ffce3a"/>
        <text x="200" y="64" font-size="12" font-weight="700" fill="#7a4400" text-anchor="middle">B</text>
        <line x1="224" y1="60" x2="312" y2="60" stroke="#7a4400" stroke-width="2"/>
        <path d="M308 56 L312 60 L308 64" fill="none" stroke="#7a4400" stroke-width="2"/>
        <circle cx="340" cy="60" r="22" fill="#3fa961"/>
        <text x="340" y="64" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
      </g>
    </g>

    <!-- Status bar -->
    <rect x="0" y="610" width="450" height="30" fill="#fafafa"/>
    <rect x="0" y="610" width="450" height="1" fill="#ebebeb"/>
    <text x="14" y="630" font-size="10" fill="#4caf50" font-weight="700">✓</text>
    <text x="24" y="630" font-size="10" fill="#999">已保存 · 16:21</text>
    <text x="436" y="630" font-size="10" fill="#999" text-anchor="end">3 张图片 · 86 字</text>
  </g>

  <!-- "Ctrl + V" callout -->
  <g transform="translate(60, 580)">
    <rect width="220" height="80" rx="14" fill="#1c2b4a"/>
    <text x="20" y="36" font-size="12" fill="#8aa0c4">键盘快捷键</text>
    <g transform="translate(20, 48)">
      <rect width="44" height="24" rx="5" fill="#3a4a6e"/>
      <text x="22" y="17" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl</text>
      <text x="50" y="18" font-size="14" font-weight="700" fill="#8aa0c4">+</text>
      <rect x="62" y="0" width="44" height="24" rx="5" fill="#3a4a6e"/>
      <text x="84" y="17" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">V</text>
      <text x="112" y="18" font-size="13" fill="#fff">即可粘贴</text>
    </g>
  </g>
</svg>
