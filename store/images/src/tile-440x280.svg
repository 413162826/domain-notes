<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a8eff"/>
      <stop offset="100%" stop-color="#1d63d4"/>
    </linearGradient>
    <filter id="tileShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0c1d3a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="440" height="280" fill="url(#tileBg)"/>

  <!-- Decorative circles -->
  <circle cx="40" cy="240" r="60" fill="#fff" fill-opacity="0.04"/>
  <circle cx="400" cy="40" r="40" fill="#fff" fill-opacity="0.06"/>

  <!-- Logo -->
  <g transform="translate(28, 60)">
    <rect width="80" height="80" rx="18" fill="#fff" filter="url(#tileShadow)"/>
    <g transform="translate(14, 14) scale(0.4)">
      <rect width="128" height="128" rx="28" fill="url(#tileBg)"/>
      <rect x="24" y="22" width="68" height="84" rx="7" fill="#fff"/>
      <path d="M82 22 L92 32 L82 32 Z" fill="#dde6f3"/>
      <rect x="33" y="38" width="50" height="5" rx="2.5" fill="#5a8fd6"/>
      <rect x="33" y="50" width="50" height="5" rx="2.5" fill="#bfd1e8"/>
      <rect x="33" y="62" width="38" height="5" rx="2.5" fill="#bfd1e8"/>
      <rect x="33" y="74" width="44" height="5" rx="2.5" fill="#bfd1e8"/>
      <rect x="33" y="86" width="28" height="5" rx="2.5" fill="#bfd1e8"/>
      <circle cx="98" cy="92" r="20" fill="#ffce3a"/>
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(128, 88)">
    <text font-size="34" font-weight="800" fill="#fff">Domain</text>
    <text y="40" font-size="34" font-weight="800" fill="#fff">Notes</text>
  </g>

  <!-- Tagline -->
  <text x="28" y="195" font-size="14" fill="#cfe1ff" font-weight="500">一个域名一本笔记 · Markdown 速记</text>

  <!-- Feature chips -->
  <g transform="translate(28, 215)">
    <rect width="100" height="22" rx="11" fill="#fff" fill-opacity="0.2"/>
    <text x="50" y="15" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">本地存储</text>
    <rect x="108" width="100" height="22" rx="11" fill="#fff" fill-opacity="0.2"/>
    <text x="158" y="15" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Markdown</text>
    <rect x="216" width="100" height="22" rx="11" fill="#fff" fill-opacity="0.2"/>
    <text x="266" y="15" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">粘贴图片</text>
  </g>
</svg>
