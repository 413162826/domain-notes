<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#dde8ff"/>
    </linearGradient>
    <filter id="popupShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#1c3470" flood-opacity="0.25"/>
    </filter>
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0c2050" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1280" height="800" fill="url(#bg1)"/>

  <!-- Marketing copy on left -->
  <g transform="translate(70, 100)">
    <rect x="0" y="0" width="80" height="6" rx="3" fill="#2680eb"/>
    <text x="0" y="60" font-size="60" font-weight="800" fill="#1c2b4a">每个域名</text>
    <text x="0" y="130" font-size="60" font-weight="800" fill="#1c2b4a">一本笔记本</text>
    <text x="0" y="200" font-size="22" fill="#4a5972" font-weight="500">边浏览边记录 · 自动归属 · 500ms 自动保存</text>

    <g transform="translate(0, 260)">
      <g transform="translate(0,0)">
        <circle cx="14" cy="14" r="14" fill="#2680eb"/>
        <text x="14" y="20" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">✓</text>
        <text x="40" y="20" font-size="18" fill="#1c2b4a">Markdown 快捷键 + 输入触发</text>
      </g>
      <g transform="translate(0,48)">
        <circle cx="14" cy="14" r="14" fill="#2680eb"/>
        <text x="14" y="20" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">✓</text>
        <text x="40" y="20" font-size="18" fill="#1c2b4a">粘贴截图直接内嵌</text>
      </g>
      <g transform="translate(0,96)">
        <circle cx="14" cy="14" r="14" fill="#2680eb"/>
        <text x="14" y="20" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">✓</text>
        <text x="40" y="20" font-size="18" fill="#1c2b4a">纯本地存储，不上传</text>
      </g>
      <g transform="translate(0,144)">
        <circle cx="14" cy="14" r="14" fill="#2680eb"/>
        <text x="14" y="20" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">✓</text>
        <text x="40" y="20" font-size="18" fill="#1c2b4a">深色模式跟随系统</text>
      </g>
    </g>
  </g>

  <!-- Browser window mock with popup -->
  <g transform="translate(680, 70)" filter="url(#lightShadow)">
    <rect width="540" height="660" rx="10" fill="#ffffff"/>
    <!-- Title bar -->
    <rect width="540" height="44" rx="10" fill="#f3f5f8"/>
    <rect y="34" width="540" height="10" fill="#f3f5f8"/>
    <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="22" r="6" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="92" y="12" width="380" height="22" rx="11" fill="#fff" stroke="#dde2ea"/>
    <text x="106" y="27" font-size="11" fill="#6b7a92" font-family="SF Mono, monospace">🔒 github.com/anthropics/claude-code</text>

    <!-- Extension toolbar icon highlighted -->
    <g transform="translate(486, 12)">
      <rect width="22" height="22" rx="4" fill="#eaf3ff" stroke="#2680eb" stroke-width="1.5"/>
      <text x="11" y="16" font-size="11" text-anchor="middle">📝</text>
    </g>
    <!-- Pointer arrow -->
    <g transform="translate(490, 38)" opacity="0.9">
      <path d="M0 0 L0 16 M-6 10 L0 16 L6 10" fill="none" stroke="#2680eb" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Webpage body (faded) -->
    <g opacity="0.4">
      <rect x="20" y="58" width="180" height="14" rx="3" fill="#dfe5ee"/>
      <rect x="20" y="84" width="500" height="6" rx="3" fill="#e8edf5"/>
      <rect x="20" y="98" width="460" height="6" rx="3" fill="#e8edf5"/>
      <rect x="20" y="112" width="500" height="6" rx="3" fill="#e8edf5"/>
      <rect x="20" y="126" width="480" height="6" rx="3" fill="#e8edf5"/>
    </g>
  </g>

  <!-- Popup floating on right -->
  <g transform="translate(890, 110)" filter="url(#popupShadow)">
    <rect width="350" height="500" rx="8" fill="#fff"/>

    <!-- Header -->
    <rect x="0" y="0" width="350" height="48" rx="8" fill="#fafafa"/>
    <rect x="0" y="38" width="350" height="10" fill="#fafafa"/>
    <rect x="0" y="47" width="350" height="1" fill="#ebebeb"/>

    <rect x="14" y="14" width="20" height="20" rx="3" fill="#dfe7f3"/>
    <text x="42" y="22" font-size="13" font-weight="700" fill="#1c2b4a">github.com</text>
    <text x="42" y="38" font-size="10" fill="#7a8aa3">anthropics/claude-code</text>

    <!-- Buttons -->
    <rect x="290" y="14" width="20" height="20" rx="4" fill="none"/>
    <circle cx="300" cy="24" r="4" fill="none" stroke="#6b7a92" stroke-width="1.5"/>
    <line x1="304" y1="28" x2="308" y2="32" stroke="#6b7a92" stroke-width="1.5"/>

    <rect x="315" y="14" width="20" height="20" rx="4" fill="#eaf3ff"/>
    <path d="M321 22 a3 3 0 016 0 v6 a2 2 0 01-2 2 h-2 a2 2 0 01-2 -2 z" fill="none" stroke="#2680eb" stroke-width="1.5"/>

    <!-- Content -->
    <g transform="translate(20, 70)">
      <text font-size="22" font-weight="700" fill="#1c2b4a">Claude Code 配置笔记</text>
      <text y="36" font-size="13" fill="#4a5972">• 安装命令：</text>
      <rect x="14" y="44" width="180" height="22" rx="4" fill="#f4f4f4"/>
      <text x="22" y="60" font-size="12" font-family="SF Mono, Consolas, monospace" fill="#c7254e">npm i -g @anthropic/claude</text>

      <text y="92" font-size="13" fill="#4a5972">• 关键快捷键：</text>
      <g transform="translate(14, 100)">
        <text font-size="12" fill="#4a5972">— </text>
        <rect x="14" y="-12" width="46" height="18" rx="3" fill="#1c2b4a"/>
        <text x="37" y="1" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl+B</text>
        <text x="68" y="1" font-size="12" fill="#4a5972">添加节点</text>
      </g>
      <g transform="translate(14, 126)">
        <text font-size="12" fill="#4a5972">— </text>
        <rect x="14" y="-12" width="46" height="18" rx="3" fill="#1c2b4a"/>
        <text x="37" y="1" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" font-family="SF Mono">Ctrl+R</text>
        <text x="68" y="1" font-size="12" fill="#4a5972">重新加载</text>
      </g>

      <text y="170" font-size="13" fill="#4a5972">• 文档链接：</text>
      <text y="188" font-size="13" fill="#2680eb" text-decoration="underline">docs.anthropic.com</text>

      <text y="222" font-size="13" fill="#4a5972">• Token 配置位置：</text>
      <text y="240" font-size="12" font-family="SF Mono" fill="#1c2b4a">~/.claude/config.json</text>

      <!-- Task list -->
      <text y="276" font-size="14" font-weight="700" fill="#1c2b4a">待办：</text>
      <g transform="translate(0, 290)">
        <rect width="14" height="14" rx="3" fill="#2680eb"/>
        <path d="M3 7 L6 10 L11 4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <text x="22" y="11" font-size="12" fill="#7a8aa3" text-decoration="line-through">读完 quickstart 文档</text>
      </g>
      <g transform="translate(0, 312)">
        <rect width="14" height="14" rx="3" fill="none" stroke="#c6d1e5" stroke-width="1.5"/>
        <text x="22" y="11" font-size="12" fill="#1c2b4a">研究 MCP server 集成</text>
      </g>
      <g transform="translate(0, 334)">
        <rect width="14" height="14" rx="3" fill="none" stroke="#c6d1e5" stroke-width="1.5"/>
        <text x="22" y="11" font-size="12" fill="#1c2b4a">写一个测试 agent</text>
      </g>
    </g>

    <!-- Status bar -->
    <rect x="0" y="471" width="350" height="29" fill="#fafafa"/>
    <rect x="0" y="471" width="350" height="1" fill="#ebebeb"/>
    <text x="14" y="490" font-size="10" fill="#4caf50" font-weight="700">✓</text>
    <text x="24" y="490" font-size="10" fill="#999">已保存 · 14:32</text>
    <text x="336" y="490" font-size="10" fill="#999" text-anchor="end">142 字</text>
  </g>
</svg>
