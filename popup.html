<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Domain Notes</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <!-- Editor view -->
    <section id="editor-view">
      <header>
        <img id="domain-favicon" alt="" />
        <div class="title-block">
          <div id="domain-label" title="">加载中…</div>
          <div id="page-sub" title=""></div>
        </div>
        <div class="actions">
          <button id="btn-insert-ref" class="icon-btn" title="插入当前页面引用 (Ctrl+Shift+R)" data-hide-when-no-url>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          </button>
          <button id="btn-folder" class="icon-btn" title="所有笔记 (Ctrl+/)">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          </button>
        </div>
      </header>
      <div id="editor"></div>
      <footer id="status-bar">
        <span id="status-text">就绪</span>
        <span id="word-count"></span>
      </footer>
    </section>

    <!-- Folder view -->
    <section id="folder-view" hidden>
      <header>
        <button id="btn-back" class="icon-btn" title="返回">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="title-block">
          <div id="folder-title">所有笔记</div>
          <div id="folder-sub"></div>
        </div>
        <div class="actions">
          <button id="btn-import" class="icon-btn" title="导入备份">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          </button>
          <button id="btn-export" class="icon-btn" title="导出备份">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          </button>
        </div>
      </header>
      <div id="domain-grid"></div>
    </section>

    <!-- Image lightbox -->
    <div id="lightbox" hidden>
      <img id="lightbox-img" alt="" />
    </div>

    <!-- Confirm dialog -->
    <div id="confirm" hidden>
      <div class="confirm-box">
        <div id="confirm-text"></div>
        <div class="confirm-buttons">
          <button id="confirm-cancel" class="btn-secondary">取消</button>
          <button id="confirm-ok" class="btn-danger">确定</button>
        </div>
      </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file" accept="application/json,.json" hidden />
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
