<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2400" viewBox="0 0 1200 2400" role="img" aria-labelledby="title desc">
  <title id="title">Domain Notes 中文信息图</title>
  <desc id="desc">介绍 Domain Notes Chrome 扩展的域名笔记、Markdown 快捷键、输入触发、备份和安装方式。</desc>
  <defs>
    <linearGradient id="heroGrad" x1="80" y1="40" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2680eb"/>
      <stop offset="1" stop-color="#1c2b4a"/>
    </linearGradient>
    <linearGradient id="blueSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eaf3ff"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1c2b4a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1c2b4a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f6faff; }
      .font { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; }
      .h1 { font-size: 74px; font-weight: 800; letter-spacing: 0; fill: #ffffff; }
      .heroSub { font-size: 28px; font-weight: 600; fill: #eaf3ff; }
      .heroText { font-size: 22px; font-weight: 500; fill: rgba(255,255,255,0.86); }
      .sectionNo { font-size: 22px; font-weight: 800; fill: #2680eb; }
      .sectionTitle { font-size: 42px; font-weight: 800; fill: #1c2b4a; }
      .sectionSub { font-size: 21px; font-weight: 500; fill: #5c6b86; }
      .cardTitle { font-size: 25px; font-weight: 800; fill: #1c2b4a; }
      .cardSub { font-size: 18px; font-weight: 500; fill: #5c6b86; }
      .small { font-size: 16px; font-weight: 500; fill: #6b7890; }
      .mono { font-family: "Cascadia Mono", Consolas, "Microsoft YaHei", monospace; }
      .key { font-size: 20px; font-weight: 800; fill: #1c2b4a; }
      .value { font-size: 20px; font-weight: 600; fill: #36506f; }
      .chipText { font-size: 21px; font-weight: 800; fill: #1c2b4a; }
      .chipSub { font-size: 17px; font-weight: 500; fill: #64738c; }
      .white { fill: #ffffff; }
      .blue { fill: #2680eb; }
      .navy { fill: #1c2b4a; }
      .muted { fill: #5c6b86; }
      .line { stroke: #cfe1f7; stroke-width: 2; }
      .dash { stroke: #2680eb; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 12; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="2400"/>
  <path d="M0 0H1200V780C1030 716 900 746 732 675C530 590 332 648 0 558Z" fill="#eaf3ff" opacity="0.55"/>

  <!-- Hero -->
  <g class="font">
    <rect x="64" y="48" width="1072" height="328" rx="32" fill="url(#heroGrad)" filter="url(#shadow)"/>
    <circle cx="1000" cy="112" r="126" fill="#ffffff" opacity="0.08"/>
    <circle cx="1035" cy="280" r="180" fill="#eaf3ff" opacity="0.08"/>
    <path d="M780 126h220c28 0 50 22 50 50v56c0 28-22 50-50 50H780c-28 0-50-22-50-50v-56c0-28 22-50 50-50Z" fill="#ffffff" opacity="0.12"/>
    <g transform="translate(88 80)">
      <rect x="0" y="0" width="226" height="46" rx="23" fill="#ffffff" opacity="0.18"/>
      <circle cx="27" cy="23" r="11" fill="#ffffff"/>
      <text x="50" y="31" font-size="19" font-weight="800" fill="#ffffff">Chrome 扩展</text>
    </g>
    <text x="88" y="178" class="h1">Domain Notes</text>
    <text x="92" y="228" class="heroSub">每个网站域名一个 Markdown 笔记本</text>
    <text x="92" y="272" class="heroText">纯本地存储 · 自动按域名归档 · 快捷键编辑 · 图片直接粘贴</text>
    <g transform="translate(86 302)">
      <rect x="0" y="0" width="222" height="52" rx="16" fill="#ffffff" opacity="0.16"/>
      <text x="22" y="34" font-size="20" font-weight="800" fill="#ffffff">eTLD+1 聚合</text>
      <rect x="244" y="0" width="188" height="52" rx="16" fill="#ffffff" opacity="0.16"/>
      <text x="266" y="34" font-size="20" font-weight="800" fill="#ffffff">500ms 自动保存</text>
      <rect x="454" y="0" width="188" height="52" rx="16" fill="#ffffff" opacity="0.16"/>
      <text x="476" y="34" font-size="20" font-weight="800" fill="#ffffff">JSON 备份</text>
    </g>
    <g transform="translate(835 170)">
      <rect x="0" y="0" width="196" height="82" rx="18" fill="#ffffff" opacity="0.88"/>
      <path d="M38 46h120" stroke="#2680eb" stroke-width="8" stroke-linecap="round"/>
      <path d="M38 25h70" stroke="#1c2b4a" stroke-width="8" stroke-linecap="round"/>
      <path d="M38 67h94" stroke="#9ec8ff" stroke-width="8" stroke-linecap="round"/>
      <rect x="-34" y="-42" width="130" height="52" rx="14" fill="#ffffff" opacity="0.92"/>
      <text x="-17" y="-9" class="mono" font-size="19" font-weight="800" fill="#2680eb"># notes</text>
    </g>
  </g>

  <!-- Section 01 -->
  <g class="font">
    <g transform="translate(80 434)">
      <rect x="0" y="0" width="94" height="40" rx="20" fill="#d8eaff"/>
      <text x="21" y="28" class="sectionNo">01</text>
      <text x="116" y="31" class="sectionTitle">工作原理：同一主域，同一本笔记</text>
      <text x="116" y="72" class="sectionSub">通过 eTLD+1 识别站点归属，子域和不同路径都会回到同一个域名笔记本。</text>
    </g>
    <rect x="80" y="548" width="1040" height="254" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <g transform="translate(116 590)">
      <rect x="0" y="0" width="254" height="54" rx="15" fill="url(#cardBlue)"/>
      <text x="20" y="34" class="mono" font-size="18" font-weight="800" fill="#1c2b4a">www.example.com/docs</text>
      <rect x="0" y="74" width="254" height="54" rx="15" fill="url(#cardBlue)"/>
      <text x="20" y="108" class="mono" font-size="18" font-weight="800" fill="#1c2b4a">app.example.com/task</text>
      <rect x="0" y="148" width="254" height="54" rx="15" fill="url(#cardBlue)"/>
      <text x="20" y="182" class="mono" font-size="18" font-weight="800" fill="#1c2b4a">blog.example.com/post</text>
    </g>
    <path d="M420 656H550" class="dash"/>
    <path d="M550 656l-18-13v26Z" fill="#2680eb"/>
    <g transform="translate(594 588)">
      <rect x="0" y="0" width="472" height="136" rx="24" fill="#eaf3ff"/>
      <rect x="34" y="35" width="72" height="72" rx="20" fill="#2680eb"/>
      <path d="M55 70h31M70 55v31" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
      <text x="132" y="58" class="cardTitle">example.com</text>
      <text x="132" y="93" class="cardSub">所有子页、子域自动归入这一笔记</text>
    </g>
    <text x="629" y="746" class="small">内部页面如 chrome://、file:// 会跳过，避免无效笔记。</text>
  </g>

  <!-- Section 02 -->
  <g class="font">
    <g transform="translate(80 822)">
      <rect x="0" y="0" width="94" height="40" rx="20" fill="#d8eaff"/>
      <text x="21" y="28" class="sectionNo">02</text>
      <text x="116" y="31" class="sectionTitle">三步上手流程</text>
      <text x="116" y="72" class="sectionSub">安装后访问任意网站，点击扩展即可开始按域名沉淀资料。</text>
    </g>
    <g transform="translate(80 938)">
      <rect x="0" y="0" width="320" height="156" rx="26" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="54" cy="50" r="25" fill="#2680eb"/>
      <text x="45" y="60" font-size="28" font-weight="800" fill="#ffffff">1</text>
      <text x="94" y="52" class="cardTitle">加载扩展</text>
      <text x="30" y="96" class="cardSub">打开 chrome://extensions</text>
      <text x="30" y="126" class="cardSub">选择 dist/ 文件夹</text>
    </g>
    <g transform="translate(440 938)">
      <rect x="0" y="0" width="320" height="156" rx="26" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="54" cy="50" r="25" fill="#2680eb"/>
      <text x="45" y="60" font-size="28" font-weight="800" fill="#ffffff">2</text>
      <text x="94" y="52" class="cardTitle">打开站点</text>
      <text x="30" y="96" class="cardSub">访问网页后点击图标</text>
      <text x="30" y="126" class="cardSub">自动识别当前域名</text>
    </g>
    <g transform="translate(800 938)">
      <rect x="0" y="0" width="320" height="156" rx="26" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="54" cy="50" r="25" fill="#2680eb"/>
      <text x="45" y="60" font-size="28" font-weight="800" fill="#ffffff">3</text>
      <text x="94" y="52" class="cardTitle">直接记录</text>
      <text x="30" y="96" class="cardSub">Markdown 编辑</text>
      <text x="30" y="126" class="cardSub">编辑后自动保存</text>
    </g>
  </g>

  <!-- Section 03 -->
  <g class="font">
    <g transform="translate(80 1160)">
      <rect x="0" y="0" width="94" height="40" rx="20" fill="#d8eaff"/>
      <text x="21" y="28" class="sectionNo">03</text>
      <text x="116" y="31" class="sectionTitle">Markdown 快捷键表</text>
      <text x="116" y="72" class="sectionSub">键盘优先，常用格式无需离开编辑区；Mac 上 Ctrl 对应 Command。</text>
    </g>
    <rect x="80" y="1274" width="1040" height="422" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="112" y="1310" width="976" height="54" rx="18" fill="#eaf3ff"/>
    <text x="142" y="1345" class="key">快捷键</text>
    <text x="372" y="1345" class="key">作用</text>
    <text x="642" y="1345" class="key">快捷键</text>
    <text x="872" y="1345" class="key">作用</text>
    <g transform="translate(112 1386)">
      <text x="30" y="0" class="key mono">Ctrl+1~6</text>
      <text x="260" y="0" class="value">标题 1~6</text>
      <text x="530" y="0" class="key mono">Ctrl+B / I</text>
      <text x="760" y="0" class="value">加粗 / 斜体</text>
      <line x1="0" y1="24" x2="976" y2="24" class="line"/>
      <text x="30" y="58" class="key mono">Ctrl+L</text>
      <text x="260" y="58" class="value">无序列表</text>
      <text x="530" y="58" class="key mono">Ctrl+Shift+L</text>
      <text x="760" y="58" class="value">有序列表</text>
      <line x1="0" y1="82" x2="976" y2="82" class="line"/>
      <text x="30" y="116" class="key mono">Ctrl+K</text>
      <text x="260" y="116" class="value">插入链接</text>
      <text x="530" y="116" class="key mono">Ctrl+Shift+T</text>
      <text x="760" y="116" class="value">任务列表</text>
      <line x1="0" y1="140" x2="976" y2="140" class="line"/>
      <text x="30" y="174" class="key mono">Ctrl+Shift+B</text>
      <text x="260" y="174" class="value">引用</text>
      <text x="530" y="174" class="key mono">Ctrl+Shift+C</text>
      <text x="760" y="174" class="value">代码块</text>
      <line x1="0" y1="198" x2="976" y2="198" class="line"/>
      <text x="30" y="232" class="key mono">Ctrl+Shift+H</text>
      <text x="260" y="232" class="value">分割线</text>
      <text x="530" y="232" class="key mono">Ctrl+/</text>
      <text x="760" y="232" class="value">所有笔记</text>
      <line x1="0" y1="256" x2="976" y2="256" class="line"/>
      <text x="30" y="290" class="key mono">Ctrl+Shift+R</text>
      <text x="260" y="290" class="value">插入当前页面引用</text>
    </g>
  </g>

  <!-- Section 04 -->
  <g class="font">
    <g transform="translate(80 1716)">
      <rect x="0" y="0" width="94" height="40" rx="20" fill="#d8eaff"/>
      <text x="21" y="28" class="sectionNo">04</text>
      <text x="116" y="31" class="sectionTitle">输入即触发</text>
      <text x="116" y="72" class="sectionSub">输入 Markdown 语法后按空格或完成标记，编辑器会自动转成结构化内容。</text>
    </g>
    <g transform="translate(80 1828)">
      <rect x="0" y="0" width="1040" height="260" rx="28" fill="#ffffff" filter="url(#shadow)"/>
      <g transform="translate(32 34)">
        <rect x="0" y="0" width="214" height="78" rx="18" fill="#eaf3ff"/>
        <text x="22" y="33" class="chipText mono"># 空格</text>
        <text x="22" y="60" class="chipSub">变标题</text>
        <rect x="244" y="0" width="214" height="78" rx="18" fill="#f7fbff" stroke="#d8eaff"/>
        <text x="266" y="33" class="chipText mono">- 空格</text>
        <text x="266" y="60" class="chipSub">变无序列表</text>
        <rect x="488" y="0" width="214" height="78" rx="18" fill="#eaf3ff"/>
        <text x="510" y="33" class="chipText mono">1. 空格</text>
        <text x="510" y="60" class="chipSub">变编号列表</text>
        <rect x="732" y="0" width="214" height="78" rx="18" fill="#f7fbff" stroke="#d8eaff"/>
        <text x="754" y="33" class="chipText mono">&gt; 空格</text>
        <text x="754" y="60" class="chipSub">变引用</text>
        <rect x="0" y="106" width="214" height="78" rx="18" fill="#f7fbff" stroke="#d8eaff"/>
        <text x="22" y="139" class="chipText mono">```</text>
        <text x="22" y="166" class="chipSub">变代码块</text>
        <rect x="244" y="106" width="214" height="78" rx="18" fill="#eaf3ff"/>
        <text x="266" y="139" class="chipText mono">`代码`</text>
        <text x="266" y="166" class="chipSub">变行内代码</text>
        <rect x="488" y="106" width="214" height="78" rx="18" fill="#f7fbff" stroke="#d8eaff"/>
        <text x="510" y="139" class="chipText mono">**粗体**</text>
        <text x="510" y="166" class="chipSub">变加粗文本</text>
        <rect x="732" y="106" width="214" height="78" rx="18" fill="#eaf3ff"/>
        <text x="754" y="139" class="chipText mono">---</text>
        <text x="754" y="166" class="chipSub">变分割线</text>
      </g>
    </g>
  </g>

  <!-- Section 05 -->
  <g class="font">
    <g transform="translate(80 2150)">
      <rect x="0" y="0" width="94" height="40" rx="20" fill="#d8eaff"/>
      <text x="21" y="28" class="sectionNo">05</text>
      <text x="116" y="31" class="sectionTitle">特色功能</text>
      <text x="116" y="72" class="sectionSub">围绕真实网页资料沉淀设计，既轻量，又方便迁移。</text>
    </g>
    <g transform="translate(80 2252)">
      <rect x="0" y="0" width="246" height="96" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="#eaf3ff"/>
      <path d="M35 58l18-20 12 14 8-9 14 15" fill="none" stroke="#2680eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="41" class="cardTitle" font-size="22">粘贴图片</text>
      <text x="92" y="70" class="cardSub" font-size="16">自动 base64 内嵌</text>
    </g>
    <g transform="translate(348 2252)">
      <rect x="0" y="0" width="246" height="96" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="#1c2b4a"/>
      <path d="M57 31a21 21 0 1 0 12 37 24 24 0 0 1-12-37Z" fill="#eaf3ff"/>
      <text x="92" y="41" class="cardTitle" font-size="22">深色模式</text>
      <text x="92" y="70" class="cardSub" font-size="16">跟随系统偏好</text>
    </g>
    <g transform="translate(616 2252)">
      <rect x="0" y="0" width="246" height="96" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="#eaf3ff"/>
      <path d="M48 35v28M36 51l12 12 12-12M32 67h32" fill="none" stroke="#2680eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="41" class="cardTitle" font-size="22">导出导入</text>
      <text x="92" y="70" class="cardSub" font-size="16">JSON 备份迁移</text>
    </g>
    <g transform="translate(884 2252)">
      <rect x="0" y="0" width="236" height="96" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="#eaf3ff"/>
      <path d="M39 43h24M39 55h18M63 35l11 11-11 11" fill="none" stroke="#2680eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="41" class="cardTitle" font-size="21">页面引用</text>
      <text x="92" y="70" class="cardSub" font-size="16">标题和链接入笔记</text>
    </g>
  </g>

  <!-- Footer -->
  <g class="font">
    <rect x="64" y="2360" width="1072" height="26" rx="13" fill="#1c2b4a"/>
    <text x="92" y="2378" font-size="18" font-weight="700" fill="#ffffff">安装提示：打开 chrome://extensions → 开启开发者模式 → 加载已解压的扩展程序 → 选择 dist/ 文件夹。</text>
  </g>
</svg>
